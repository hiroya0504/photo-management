spring:
  application:
    name: photo-management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/photo_management}
    username: ${DB_USERNAME:photo}
    password: ${DB_PASSWORD:photo}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.example.photomanagement: DEBUG
