services:
  postgres:
    image: postgres:16-alpine
    container_name: photo-management-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: photo_management
      POSTGRES_USER: photo
      POSTGRES_PASSWORD: photo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photo -d photo_management"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
