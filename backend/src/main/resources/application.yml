spring:
  application:
    name: photo-management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/photo_management}
    username: ${DB_USERNAME:photo}
    password: ${DB_PASSWORD:photo}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: ${SERVER_PORT:8080}

# Logging is configured in src/main/resources/logback-spring.xml
# (profile-based: human-readable locally, JSON in prod).

auth:
  jwt:
    # Dev-only default to keep local startup smooth. Production MUST set AUTH_JWT_SECRET (>= 32 bytes).
    secret: ${AUTH_JWT_SECRET:dev-only-secret-do-not-use-in-production-min-32-bytes}
    access-ttl: 15m
  refresh-token:
    ttl: 7d
    cookie-name: refresh_token
    # Scoped to /api/auth (not just /api/auth/refresh) so the cookie is also sent on
    # /api/auth/logout. With the narrower path the browser withholds the cookie on logout, the
    # server-side revoke never runs, and the refresh row stays valid for its full TTL even after
    # the user "logs out". SameSite=Strict + HttpOnly are unchanged, so CSRF/XSS posture is the same.
    cookie-path: /api/auth
    # Defaults to false so the cookie works on http://localhost in dev.
    # Production MUST set AUTH_REFRESH_SECURE=true (HTTPS only).
    secure: ${AUTH_REFRESH_SECURE:false}
    grace-window: 5s
  password:
    bcrypt-strength: 12

